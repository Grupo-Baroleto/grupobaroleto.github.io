<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Baroleto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#f4f7f6] flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl overflow-hidden">
        <div class="bg-blue-600 p-8 text-white text-center">
            <i class="fa-solid fa-wifi text-4xl mb-4 opacity-50"></i>
            <h2 id="clientName" class="text-xl font-bold uppercase tracking-tight">Buscando Fatura...</h2>
            <p id="refDate" class="text-blue-100 text-xs italic">Aguarde um momento</p>
        </div>

        <div class="p-8" id="content-area">
            <div class="flex justify-between items-center bg-slate-50 p-5 rounded-2xl mb-8 border border-slate-100">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Valor da Mensalidade</p>
                    <p class="text-3xl font-black text-blue-600">R$ 50,00</p>
                </div>
                <div class="text-right">
                    <p class="text-xs font-bold text-slate-600">Plano Fibra</p>
                    <p class="text-xs text-blue-500 font-bold">1 Gbps</p>
                </div>
            </div>

            <div class="text-center">
                <p class="text-sm font-bold text-slate-700 mb-4 flex items-center justify-center">
                    <i class="fa-brands fa-pix text-teal-500 mr-2 text-lg"></i> Pague com Pix
                </p>
                
                <!-- CERTIFIQUE-SE QUE A IMAGEM qrcode-pix.png ESTÁ NA MESMA PASTA NO GITHUB -->
                <div class="bg-white border-2 border-dashed border-slate-200 p-3 rounded-2xl inline-block mb-6">
                    <img src="qrcode-pix.png" alt="QR Code Pix" class="w-48 h-48 mx-auto" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <span style="display:none;" class="text-xs text-red-500">Erro ao carregar QR Code. Verifique o arquivo qrcode-pix.png</span>
                </div>

                <div class="space-y-3">
                    <button onclick="copyPix()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-black transition flex items-center justify-center gap-2 shadow-xl">
                        <i class="fa-solid fa-copy text-teal-400"></i> COPIAR PIX COPIA E COLA
                    </button>
                    <p class="text-[10px] text-gray-400 uppercase font-bold tracking-tighter">
                        Após o pagamento, o sinal é liberado.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBGAmDeELLco_wONy9HirW8IdcG4-PcGPE",
            authDomain: "baroleto-cobrancas.firebaseapp.com",
            projectId: "baroleto-cobrancas",
            storageBucket: "baroleto-cobrancas.firebasestorage.app",
            messagingSenderId: "221414092860",
            appId: "1:221414092860:web:145e50c77065241a3dd339",
            measurementId: "G-MVT3N6NMV6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (id) {
            const docRef = doc(db, "devedores", id);
            
            try {
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('clientName').innerText = data.name;
                    document.getElementById('refDate').innerText = `Referência: ${data.month} de ${data.year}`;
                } else {
                    showError();
                }
            } catch (error) {
                console.error("Erro:", error);
                showError();
            }
        } else {
            showError();
        }

        function showError() {
            document.getElementById('clientName').innerText = "Link Inválido";
            document.getElementById('refDate').innerText = "Fatura não encontrada ou já excluída.";
            document.getElementById('content-area').innerHTML = "<p class='text-center text-gray-500 mt-10'>Por favor, solicite um novo link de pagamento.</p>";
        }

        window.copyPix = () => {
            const chave = "00020126930014br.gov.bcb.pix013652de030e-5125-4ead-9f0a-b17bf7df95380231Cofrinho de Medson Jorge Noleto5204000053039865802BR5919Medson Jorge Noleto6006Palmas61087706432862270523COFRNjM5Nzg0OTAwMDAwMDU6304D70A";
            navigator.clipboard.writeText(chave);
            alert("Código Pix copiado!");
        };
    </script>
</body>
</html>
